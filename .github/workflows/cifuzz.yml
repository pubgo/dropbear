# Runs fuzzers for a little while on pull requests.
# From https://google.github.io/oss-fuzz/getting-started/continuous-integration/
name: CIFuzz
on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - master
# Cancel superseded runs on the same ref so pushes don't pile up.
concurrency:
  group: cifuzz-${{ github.ref }}
  cancel-in-progress: true
jobs:
  Fuzzing:
    runs-on: ubuntu-latest
    # oss-fuzz Dockerfile clones hg.ucc.asn.au/dropbear-fuzzcorpus; that remote
    # often aborts mid-stream ("stream ended unexpectedly") and is outside our control.
    continue-on-error: true
    steps:
      - name: Build Fuzzers
        id: build
        uses: google/oss-fuzz/infra/cifuzz/actions/build_fuzzers@master
        with:
          oss-fuzz-project-name: "dropbear"
          dry-run: false
      - name: Run Fuzzers
        uses: google/oss-fuzz/infra/cifuzz/actions/run_fuzzers@master
        with:
          oss-fuzz-project-name: "dropbear"
          fuzz-seconds: 300
          dry-run: false
      - name: Upload Crash
        uses: actions/upload-artifact@v4
        if: failure() && steps.build.outcome == 'success'
        with:
          name: artifacts
          path: ./out/artifacts
