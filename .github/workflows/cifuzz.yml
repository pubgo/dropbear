# Optional manual fuzz run only.
# Not on push/PR: oss-fuzz clones hg.ucc.asn.au/dropbear-fuzzcorpus, which
# frequently fails (HTTP 525 / truncated stream) and is outside our control.
name: CIFuzz
on:
  workflow_dispatch:
concurrency:
  group: cifuzz-${{ github.ref }}
  cancel-in-progress: true
jobs:
  Fuzzing:
    runs-on: ubuntu-latest
    steps:
      - name: Build Fuzzers
        id: build
        uses: google/oss-fuzz/infra/cifuzz/actions/build_fuzzers@master
        with:
          oss-fuzz-project-name: "dropbear"
          dry-run: false
      - name: Run Fuzzers
        uses: google/oss-fuzz/infra/cifuzz/actions/run_fuzzers@master
        with:
          oss-fuzz-project-name: "dropbear"
          fuzz-seconds: 300
          dry-run: false
      - name: Upload Crash
        uses: actions/upload-artifact@v4
        if: failure() && steps.build.outcome == 'success'
        with:
          name: artifacts
          path: ./out/artifacts
